<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="わんにゃんメモリー">
  <meta name="theme-color" content="#f5ede0">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/01.png">
  <title>わんにゃんメモリー</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <div id="screen-select" class="screen active">
      <div class="select-bg"></div>
      <div class="select-content">
        <div class="app-logo">
          <div class="logo-paw">🐾</div>
          <h1 class="app-title">わんにゃん<br>メモリー</h1>
          <p class="app-sub">大切なペットの記録帳</p>
        </div>
        <div class="select-cards">
          <button class="select-card dog-card" onclick="selectType('dog')">
            <div class="card-emoji">🐕</div>
            <div class="card-label">いぬ</div>
            <div class="card-sub">Dog</div>
          </button>
          <button class="select-card cat-card" onclick="selectType('cat')">
            <div class="card-emoji">🐈</div>
            <div class="card-label">ねこ</div>
            <div class="card-sub">Cat</div>
          </button>
        </div>
        <div class="select-footer">
          <button class="transfer-btn" onclick="openTransferModal()">📦 データの引き継ぎ</button>
        </div>
      </div>
    </div>

    <div id="screen-list" class="screen">
      <header class="app-header">
        <button class="back-btn" onclick="goBack()"><span class="back-arrow">←</span></button>
        <div class="header-title"><span id="list-type-emoji"></span><span id="list-type-name"></span>のリスト</div>
        <button class="header-icon-btn" onclick="openIssueFolder()" title="問題フォルダ">📂</button>
        <button class="header-icon-btn add-btn-icon" onclick="openAddModal()">＋</button>
      </header>
      <div class="list-controls">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="search-input" class="search-input" placeholder="名前で検索…" oninput="filterList()">
        </div>
        <div class="sort-buttons">
          <button class="sort-btn active" id="sort-name-btn" onclick="sortList('name')">名前順</button>
          <button class="sort-btn" id="sort-date-btn" onclick="sortList('date')">記録日順</button>
        </div>
      </div>
      <div id="pet-list" class="pet-list"></div>
    </div>

    <div id="screen-detail" class="screen">
      <header class="app-header">
        <button class="back-btn" onclick="goToList()"><span class="back-arrow">←</span></button>
        <div class="header-title" id="detail-header-name">詳細</div>
        <button class="edit-toggle-btn" id="edit-toggle-btn" onclick="toggleEditMode()">編集</button>
      </header>
      <div id="detail-content" class="detail-content"></div>
    </div>

    <div id="screen-folder" class="screen">
      <header class="app-header">
        <button class="back-btn" onclick="closeIssueFolder()"><span class="back-arrow">←</span></button>
        <div class="header-title">📂 問題フォルダ</div>
        <div style="width:40px"></div>
      </header>
      <div class="folder-controls">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input type="text" id="folder-search" class="search-input" placeholder="名前で絞り込み…" oninput="renderFolderScreen()">
        </div>
      </div>
      <div id="folder-content" class="folder-content"></div>
    </div>

    <div id="screen-survey" class="screen">
      <header class="app-header">
        <button class="back-btn" onclick="closeSurvey()"><span class="back-arrow">←</span></button>
        <div class="header-title">📋 アンケート</div>
        <button class="edit-toggle-btn" id="survey-edit-btn" onclick="toggleSurveyEdit()">編集</button>
      </header>
      <div id="survey-content" class="detail-content"></div>
    </div>
  </div>

  <div id="modal-add" class="modal-overlay" onclick="closeModal(event,'modal-add')">
    <div class="modal-box">
      <div class="modal-header">
        <h3 class="modal-title">新しい子を追加</h3>
        <button class="modal-close" onclick="closeAddModal()">✕</button>
      </div>
      <div class="modal-body">
        <label class="field-label">名前 <span class="required">*</span></label>
        <input type="text" id="new-name" class="field-input" placeholder="名前を入力">
        <label class="field-label">生年月日</label>
        <input type="date" id="new-birthday" class="field-input">
        <label class="field-label">年齢（生年月日未入力時）</label>
        <input type="text" id="new-age" class="field-input" placeholder="例: 3歳2ヶ月">
        <label class="field-label">写真</label>
        <div class="photo-upload-area" onclick="document.getElementById('new-photo-input').click()">
          <img id="new-photo-preview" class="photo-preview hidden" src="" alt="">
          <div id="new-photo-placeholder" class="photo-placeholder">
            <span>📷</span><span>タップして写真を選択</span>
          </div>
          <input type="file" id="new-photo-input" accept="image/*,image/heic,image/heif" class="hidden" onchange="previewNewPhoto(event)">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeAddModal()">キャンセル</button>
        <button class="btn-primary" onclick="addPet()">追加する</button>
      </div>
    </div>
  </div>

  <div id="modal-delete" class="modal-overlay" onclick="closeModal(event,'modal-delete')">
    <div class="modal-box modal-box-small">
      <div class="modal-header"><h3 class="modal-title">削除の確認</h3></div>
      <div class="modal-body">
        <p style="text-align:center;color:#666;">この子の記録を削除しますか？<br>この操作は取り消せません。</p>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" onclick="closeModal(null,'modal-delete')">キャンセル</button>
        <button class="btn-danger" onclick="confirmDelete()">削除する</button>
      </div>
    </div>
  </div>

  <div id="modal-breed" class="modal-overlay" onclick="closeModal(event,'modal-breed')">
    <div class="modal-box modal-box-tall">
      <div class="modal-header">
        <h3 class="modal-title">犬種を選択</h3>
        <button class="modal-close" onclick="closeModal(null,'modal-breed')">✕</button>
      </div>
      <div class="modal-body" style="padding-bottom:0">
        <div class="search-wrap" style="margin-bottom:10px">
          <span class="search-icon">🔍</span>
          <input type="text" id="breed-search-input" class="search-input" placeholder="犬種を検索…" oninput="renderBreedList()">
        </div>
        <div class="breed-sort-btns">
          <button class="sort-btn active" id="bsort-group" onclick="setBreedSort('group')">グループ順</button>
          <button class="sort-btn" id="bsort-alpha" onclick="setBreedSort('alpha')">五十音順</button>
        </div>
      </div>
      <div id="breed-list" class="breed-list"></div>
    </div>
  </div>

  <div id="modal-transfer" class="modal-overlay" onclick="closeModal(event,'modal-transfer')">
    <div class="modal-box modal-box-tall">
      <div class="modal-header">
        <h3 class="modal-title">📦 データの引き継ぎ</h3>
        <button class="modal-close" onclick="closeModal(null,'modal-transfer')">✕</button>
      </div>
      <div class="modal-body">
        <div class="transfer-section">
          <h4 class="transfer-title">📤 エクスポート（バックアップ）</h4>
          <p class="transfer-desc">全データをJSONファイルとして保存します。<br>機種変更前にこちらを実行してください。</p>
          <button class="btn-transfer export" onclick="exportData()">データをエクスポート</button>
        </div>
        <div class="transfer-divider"></div>
        <div class="transfer-section">
          <h4 class="transfer-title">📥 インポート（復元）</h4>
          <p class="transfer-desc">エクスポートしたJSONファイルを読み込みます。<br>※現在のデータに上書きされます。</p>
          <button class="btn-transfer import" onclick="document.getElementById('import-file').click()">データをインポート</button>
          <input type="file" id="import-file" accept=".json" class="hidden" onchange="importData(event)">
        </div>
        <div class="transfer-divider"></div>
        <div class="transfer-section">
          <h4 class="transfer-title" style="color:#c04040">⚠️ データをリセット</h4>
          <p class="transfer-desc">全データを削除します。この操作は取り消せません。</p>
          <button class="btn-transfer danger" onclick="confirmReset()">全データを削除</button>
        </div>
        <div style="height:20px"></div>
      </div>
    </div>
  </div>

  <script src="breeds.js"></script>
  <script src="app.js"></script>
</body>
</html>
